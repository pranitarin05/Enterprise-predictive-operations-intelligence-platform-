name: epoip

x-airflow-common: &airflow-common
  build:
    context: ./airflow-image
    dockerfile: Dockerfile
  user: "${AIRFLOW_UID}:0"
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    # --- Correct in-Docker-network addresses for our Spark jobs ---
    # "localhost" would point at THIS container, not the actual services --
    # Docker Compose lets containers reach each other by service name instead.
    S3_ENDPOINT_URL: "http://minio:9000"
    S3_ACCESS_KEY: "${S3_ACCESS_KEY:-minioadmin}"
    S3_SECRET_KEY: "${S3_SECRET_KEY:-minioadmin}"
    KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
  volumes:
    - ../../airflow/dags:/opt/airflow/dags
    - ../../airflow/logs:/opt/airflow/logs
    - ../../airflow/plugins:/opt/airflow/plugins
    - ../../services/stream-processor:/opt/stream-processor
    - airflow_ivy_cache:/home/airflow/.ivy2
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  airflow-postgres:
    image: postgres:16-alpine
    container_name: epoip-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: epoip-airflow-init
    user: "0:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
        chown -R "${AIRFLOW_UID}:0" /home/airflow/.ivy2
        su airflow -c "airflow db migrate"
        su airflow -c "airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@epoip.local --password admin" || true

  airflow-webserver:
    <<: *airflow-common
    container_name: epoip-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: epoip-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  airflow_postgres_data:
  airflow_ivy_cache:
