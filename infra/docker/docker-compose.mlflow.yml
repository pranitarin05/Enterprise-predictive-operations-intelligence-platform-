name: epoip

services:
  mlflow:
    build:
      context: ./mlflow-image
      dockerfile: Dockerfile
    container_name: epoip-mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "${S3_ACCESS_KEY:-minioadmin}"
      AWS_SECRET_ACCESS_KEY: "${S3_SECRET_KEY:-minioadmin}"
    command: >
      --backend-store-uri postgresql://${POSTGRES_USER:-epoip_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/mlflow
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
    restart: unless-stopped
